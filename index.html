    <title>Meus Produtos | Monitorando</title>
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">

                <button class="btn-primary-add ad-pop">
                    <i class="fa-solid fa-plus"></i> Adicionar
                </button>
            </div>

            <nav>
                <ul>
                    <li class="active" style="padding: 0;">
                        <a href="index.html">
                            <i class="fa-solid fa-cube"></i>
                            <span>Meus Produtos</span>
                        </a>
                    </li>

                    <li style="padding: 2px;">
                        <a href="HTML/perfil.html">
                            <i class="fa-regular fa-user"></i>
                            <span>Perfil</span>
                        </a>
                    </li>

                    <li style="padding: 2px;">
                        <a href="">
                            <i class="fa-solid fa-chart-pie"></i>
                            <span>Visão Geral</span>

                    <li style="padding: 2px;">
                        <a href="">

                            <span>Ajustes</span>

                    </li>

                </ul>
            </nav>
        </aside>

        <main class="main-content">
            
            <header>
                <h2>Meus Produtos</h2>
                <div class="header-tools">
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Pesquisar produtos...">
                    </div>
                    <div class="filters">
                        <button><i class="fa-solid fa-filter"></i> Filtro</button>
                        <button><i class="fa-solid fa-arrow-up-wide-short"></i> Ordenar</button>
                    </div>
                </div>
            </header>

            <div class="products-grid" id="productsGrid">
                
                <div class="product-card empty-card">
                    <div class="card-image-placeholder"></div>
                    <div class="card-info">
                        <button class="btn-card-add ad-pop">Adicionar produto</button>
                        <p class="meta-text">Meta: R$0.00,00</p>
                    </div>
                </div>
                <div class="product-card empty-card"><div class="card-image-placeholder"></div><div class="card-info"><button class="btn-card-add ad-pop">Adicionar produto</button><p class="meta-text">Meta: R$0.00,00</p></div></div>
                <div class="product-card empty-card"><div class="card-image-placeholder"></div><div class="card-info"><button class="btn-card-add ad-pop">Adicionar produto</button><p class="meta-text">Meta: R$0.00,00</p></div></div>
                <div class="product-card empty-card"><div class="card-image-placeholder"></div><div class="card-info"><button class="btn-card-add ad-pop">Adicionar produto</button><p class="meta-text">Meta: R$0.00,00</p></div></div>
                <div class="product-card empty-card"><div class="card-image-placeholder"></div><div class="card-info"><button class="btn-card-add ad-pop">Adicionar produto</button><p class="meta-text">Meta: R$0.00,00</p></div></div>
                <div class="product-card empty-card"><div class="card-image-placeholder"></div><div class="card-info"><button class="btn-card-add ad-pop">Adicionar produto</button><p class="meta-text">Meta: R$0.00,00</p></div></div>
                <div class="product-card empty-card"><div class="card-image-placeholder"></div><div class="card-info"><button class="btn-card-add ad-pop">Adicionar produto</button><p class="meta-text">Meta: R$0.00,00</p></div></div>
                <div class="product-card empty-card"><div class="card-image-placeholder"></div><div class="card-info"><button class="btn-card-add ad-pop">Adicionar produto</button><p class="meta-text">Meta: R$0.00,00</p></div></div>
            </div>
        </main>
    </div>
    
<div id="modal-produto" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="btn-fechar-modal" class="btn-fechar">
                <i class="fa-solid fa-x"></i>
            </button>

            <div class="modal-duas-colunas">
                
                <label class="modal-foto" for="upload-img">
                    <i class="fa-solid fa-camera-retro"></i>
                    <span class="txt-foto">Upload da foto do produto</span>
                    <span class="txt-opcional">(Opcional)</span>
                    <input type="file" id="upload-img" style="display: none;" accept="image/*">
                </label>

                <div class="modal-form-container">
                    <h2 class="modal-title">Adicionar Produto</h2>
                    
                    <form id="form-adicionar-produto" class="modal-form">
                        <div class="form-group">
                            <label>Link do Produto (URL)</label>
                            <input type="url" name="link_produto" placeholder="Cole o link aqui...">
                        </div>
                        
                        <div class="form-group">
                            <label>Nome do Produto</label>
                            <input type="text" name="nome_produto" placeholder="Ex: iPhone 17 Pro Max">
                        </div>
                        
                        <div class="form-row-prices">
                            <div class="form-group flex-1">
                                <label>Preço Atual</label>
                                <input type="text" id="preco" name="preco" placeholder="0,00" onkeyup="formatarMoeda(this)">
                            </div>
                            <div class="form-group flex-1">
                                <label>Sua Meta</label>
                                <input type="text" id="meta" name="meta" placeholder="0,00" onkeyup="formatarMoeda(this)">
                            </div>
                        </div>
                <div class="form-group">
                    <label for="categorias">Categoria do Produto</label>
                    <select name="categorias" class="categ">
                        <option value="eletronicos">Eletrônicos</option>
                        <option value="informatica">Informática</option>
                        <option value="games">Games</option>                        
                        <option value="celulares">Celulares e Smartphones</option>
                        <option value="eletrodomesticos">Eletrodomésticos</option>
                        <option value="eletroportateis">Eletroportáteis</option>
                        <option value="moveis">Móveis</option>
                        <option value="decoracao">Decoração</option>
                        <option value="cama_mesa_banho">Cama, Mesa e Banho</option>
                        <option value="moda">Moda</option>
                        <option value="calcados">Calçados</option>
                        <option value="acessorios">Acessórios</option>
                        <option value="beleza">Beleza e Cosméticos</option>
                        <option value="saude">Saúde e Bem-estar</option>
                        <option value="alimentos">Alimentos e Bebidas</option>
                        <option value="esportes">Esportes e Fitness</option>
                        <option value="lazer">Lazer e Entretenimento</option>
                        <option value="brinquedos">Brinquedos e Jogos</option>
                        <option value="livros">Livros</option>
                        <option value="papelaria">Papelaria</option>
                        <option value="automotivo">Automotivo</option>
                        <option value="ferramentas">Ferramentas</option>
                        <option value="petshop">Pet Shop</option>
                        <option value="bebes">Bebês</option>
                        <option value="musica">Instrumentos Musicais</option>
                        <option value="industria">Indústria e Comércio</option>
                        <option value="servicos">Serviços</option>
                        <option value="outros">Outros</option>
                    </select>
                </div>

                 <div class="form-group">
                    <label>Outras Opções</label>
                    <br>
                    <div class="opcoes-container">
                        <div>
                            <label style="width: 250px;" for="email">Notificar por E-mail</label>
                            <input type="checkbox" name="email" id="email">
                        </div>
                        <div>
                            <label style="width: 250px;" for="prioridade">Prioridade alta</label>
                            <input type="checkbox" name="prioridade" id="prioridade">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-modal-enviar">
                    Adicionar produto
                </button>

            </form>
        </div>
    </div>
</div>
    <script src="../JS/dashboard.js"></script>

    <script>
            /*POP-UP ADICIONAR PRODUTO*/
            lucide.createIcons();

            const botoesAbrir = document.querySelectorAll('.ad-pop');
            const modalProduto = document.getElementById('modal-produto');
            const btnFecharModal = document.getElementById('btn-fechar-modal');

            botoesAbrir.forEach(botao => {
                botao.addEventListener('click', () => {
                    modalProduto.classList.remove('hidden');
                });
            });

            btnFecharModal.addEventListener('click', () => {
                modalProduto.classList.add('hidden');
            });

            function formatarMoeda(i) {
            var v = i.value.replace(/\D/g,'');
            v = (v/100).toFixed(2) + '';
            v = v.replace(".", ",");
            v = v.replace(/(\d)(\d{3})(\d{3})/g, "$1.$2.$3");
            v = v.replace(/(\d)(\d{3})/g, "$1.$2");
            i.value = v;
            }

            const inputUploadImg = document.getElementById('upload-img');
        const labelFoto = document.querySelector('.modal-foto');

        inputUploadImg.addEventListener('change', function(e) {
            if (e.target.files[0]) {
                const leitor = new FileReader();
                leitor.onload = function(evento) {
                    labelFoto.style.backgroundImage = `url('${evento.target.result}')`;
                    labelFoto.style.backgroundSize = 'cover';
                    labelFoto.style.backgroundPosition = 'center';
                    labelFoto.style.borderStyle = 'none';
                    
                    labelFoto.querySelector('i').style.display = 'none';
                    labelFoto.querySelector('.txt-foto').style.display = 'none';
                    labelFoto.querySelector('.txt-opcional').style.display = 'none';
                }
                leitor.readAsDataURL(e.target.files[0]);
            }
        });v
            
    </script>

</body>
</html>
